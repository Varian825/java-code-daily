<html>
    <head>
        <title>Exercise 01</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>HTML Forms</h1>
        <form action="index.html">
            <label for="1">Text Box</label>
            <input type="text" id="1"  name="txtText" value="" size="5">
            <br/>
            <label for="2">Password</label>
            <input type="password" id="2"  name="txtPassword" value="">
            <br/>
            <label for="3">Hidden</label>
            <input type="hidden" id="3" name="txtHidden" value="">
            <br/>
            Male<input type="checkbox" id="4" name="chkCheck" value="ON" checked="checked">
            <br/>
            Status<input type="radio" name="rdoStatus" value="Sigle" checked="checked">Single<br/>
            <input type="radio" name="rdoStatus" value="Married">Married<br/>
            <input type="radio" name="rdoStatus" value="Divorsed">Divorsed
            <br/>
            Combo Box <select name="txtCombo">
                <option value="Servlet">JSP and Servlet</option>
                <option value="EJB">EJB</option>
            </select>
            <br/>
            Multiple <select name="txtList" multiple="multiple" size="3">
                <option value="Servlet">JSP and Servlet</option>
                <option value="EJB">EJB</option>
                <option value="Java">Java Core</option>
            </select>
            <br/>
            Text Area <textarea name="txtArea" rows="4" cols="20">
                    This is a form parameters demo!!!
            </textarea>
            <br/>
            <input type="submit" name="txtB">
            <input type="submit" value="Register" name="action">
            <input type="reset" name="txtB">
            <input type="button" value="JavaScript" name="txtB" onclick="">
        </form>
    </body>
